# =====================================================
# 智慧烟感系统 - Kubernetes 部署文件
# =====================================================

# 1. 创建命名空间（隔离项目资源）
apiVersion: v1
kind: Namespace
metadata:
  name: smoke-sensor

---
# 2. MySQL 数据库配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: smoke-sensor
data:
  MYSQL_DATABASE: smoke_sensor
  MYSQL_USER: remote_user
  MYSQL_PASSWORD: your_password
  MYSQL_ROOT_PASSWORD: root_password

---
# 3. MySQL 部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: smoke-sensor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        envFrom:
        - configMapRef:
            name: mysql-config
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        - name: init-sql
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: mysql-data
        emptyDir: {}  # 生产环境用 persistentVolumeClaim
      - name: init-sql
        configMap:
          name: mysql-init-sql

---
# 4. MySQL Service（内部访问）
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: smoke-sensor
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  type: ClusterIP  # 只在集群内部访问

---
# 5. 后端 Spring Boot 部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: smoke-sensor
spec:
  replicas: 2  # 2个副本，高可用
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: your-dockerhub/smoke-backend:latest  # 你的后端镜像
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql:3306/smoke_sensor?useSSL=false&serverTimezone=Asia/Shanghai"
        - name: SPRING_DATASOURCE_USERNAME
          value: "remote_user"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "your_password"
        - name: MQTT_HOST_URL
          value: "tcp://43.136.185.53:1883"
        readinessProbe:
          httpGet:
            path: /api/test
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10

---
# 6. 后端 Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: smoke-sensor
spec:
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP

---
# 7. 前端 Vue 部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: smoke-sensor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: your-dockerhub/smoke-frontend:latest  # 你的前端镜像
        ports:
        - containerPort: 80

---
# 8. 前端 Service（对外暴露）
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: smoke-sensor
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080  # 外部访问端口
  type: NodePort  # 通过节点IP+端口访问

---
# 9. Ingress（可选，用域名访问）
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smoke-ingress
  namespace: smoke-sensor
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: smoke.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8080
