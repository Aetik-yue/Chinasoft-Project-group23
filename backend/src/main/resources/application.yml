server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://47.108.58.107:3306/dream28?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: c0765083cd3f57ab
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB       # 上传图片大小上限
      max-request-size: 10MB

  # Redis 缓存配置
  # 连接本地 Docker 容器启动的 Redis，用于缓存高频查询数据，减轻 MySQL 压力
  data:
    redis:
      host: localhost            # Redis 服务器地址（Docker 本地映射）
      port: 6379                 # Redis 端口（默认）
      timeout: 3000ms            # 连接超时时间
      lettuce:
        pool:
          max-active: 16         # 连接池最大连接数
          max-idle: 8            # 连接池最大空闲连接
          min-idle: 2            # 连接池最小空闲连接

# SmartJavaAI 视觉复核配置（P2 加分项）
# 未配置模型时 /api/vision/check 返回 5001，应用仍可正常启动
smartjavaai:
  vision:
    enabled: false                 # 模型就绪后改为 true
    model-path: ""                 # 火焰/烟雾自定义 YOLO 模型 (.onnx)，需自备；为空则复核不可用
    model-enum: YOLOV12_CUSTOM_ONNX # 自定义模型枚举，详见 SmartJavaAI 文档
    threshold: 0.5                 # 置信度阈值
    width: 640                     # 模型训练图片宽度
    height: 640                    # 模型训练图片高度
    snapshot-path: ""              # 摄像头截图文件路径（骨架占位，无真实摄像头）；接入后改为可访问 URL
    fire-classes: fire,flame       # 视为「明火」的类别名（取决于自定义模型 synset）
    smoke-classes: smoke           # 视为「烟雾」的类别名

# 鹦鹉检测 + CLIP 行为识别配置（P2 加分项）
# 未配置模型时 /api/parrot/behavior 返回 5001，应用仍可正常启动
parrot:
  snapshot-path: "e:/Chinasoft-Project-group23/smartjavaai-models/parrot.png"
  detection:
    enabled: true
    model-path: "e:/Chinasoft-Project-group23/smartjavaai-models/yolov8n.onnx"
    model-enum: YOLOV8_OFFICIAL_ONNX
    threshold: 0.4
    bird-classes: bird
  clip:
    enabled: true
    model-path: "e:/Chinasoft-Project-group23/smartjavaai-models/clip.pt"
  behavior:
    prompts:                      # CLIP 行为描述（英文，OpenAI CLIP 英文训练），与 labels 一一对应
      - "a photo of a parrot eating food"
      - "a photo of a parrot drinking water"
      - "a photo of a parrot preening its feathers"
      - "a photo of a parrot flying"
      - "a photo of a parrot climbing"
      - "a photo of a parrot sleeping"
    labels: [进食, 饮水, 梳理羽毛, 飞翔, 攀爬, 睡觉]  # 中文标签，与 prompts 一一对应
  species:
    prompts:                      # CLIP 种类描述（英文），与 labels 一一对应
      - "a photo of a budgerigar parrot"
      - "a photo of a cockatiel"
      - "a photo of a lovebird"
      - "a photo of a green-cheeked conure"
      - "a photo of a sun conure"
      - "a photo of an african grey parrot"
      - "a photo of a macaw"
      - "a photo of a cockatoo"
      - "a photo of an amazon parrot"
      - "a photo of an eclectus parrot"
    labels: [虎皮鹦鹉, 玄凤鹦鹉, 牡丹鹦鹉, 绿颊锥尾鹦鹉, 太阳锥尾鹦鹉, 非洲灰鹦鹉, 金刚鹦鹉, 葵花鹦鹉, 亚马逊鹦鹉, 折衷鹦鹉]

# QQ 机器人配置（NapCat / OneBot v11 协议）
# 默认 enabled=false，未部署 NapCat 时 QQ 相关功能静默跳过，应用仍可正常启动
# 部署步骤：
#   1. 本机安装 QQNT 桌面客户端 + NapCat（https://github.com/NapNeko/NapCatQQ）
#   2. 启动 NapCat，用小号扫码登录
#   3. NapCat WebUI 中开启 HTTP 服务（端口 3000）+ HTTP POST 上报（地址 http://127.0.0.1:8080/api/qq/callback）
#   4. 设置 access_token，将 enabled 改为 true，填入小号 QQ 号
qq:
  onebot:
    enabled: true                      # NapCat 部署完成后改为 true
    base-url: http://localhost:3000      # NapCat HTTP API 地址
    access-token: ${ONEBOT_ACCESS_TOKEN:}      # NapCat 配置的 access_token（通过环境变量注入）
    allowed-users: [2473467191, 230952682, 2963057956, 2908431040, 1022632043]                    # 允许交互的 QQ 号白名单，如 [123456, 789012]
    push-target-user: 2473467191   # 主动推送目标 QQ 号（告警/日报发给他）
  # MaxKB 智能问答（agent 自然语言兜底，未配置则走规则问答）
  maxkb:
    enabled: true
    base-url: http://192.168.20.24:18080/chat     # Nginx 路径前缀 /chat
    app-id: ${MAXKB_APP_ID:}
    api-key: ${MAXKB_API_KEY:}
  # DeepSeek 大模型（function calling agent，优先于 MaxKB 与规则）
  # 启用后用户可用自然语言交互，模型自动调用查询/控制工具
  llm:
    enabled: true                       # 临时关闭止损，排查清楚再开
    base-url: https://api.deepseek.com   # OpenAI 兼容地址
    api-key: ${DEEPSEEK_API_KEY:}        # DeepSeek API Key（通过环境变量注入）
    model: deepseek-v4-flash                 # 支持 function calling
    max-rounds: 5                        # function calling 最大轮数
    system-prompt: |
      你是一个友好博学的 QQ 助手，同时负责管理「智慧宠物烟感安全系统」。
      你可以闲聊、回答各类常识问题，也能管理烟感系统。

      规则：
      - 用户询问系统实时数据（烟雾浓度、温度、湿度、设备状态、告警等）时，必须调用对应工具查询，不要凭空编造数字
      - 用户要控制设备（蜂鸣器/报警灯/总开关）时，调用 control_device 工具，系统会要求二次确认
      - 其他问题（闲聊、常识、百科、写作等）用你的知识正常回答
      - 回复简洁，用中文

# 通义千问视觉模型配置（3D 模拟模式，P2 加分项）
# 用于零样本多模态识别 3D 画面中的鹦鹉种类与行为
# 获取 API Key：阿里云百炼 → DashScope → 创建 Key → 设环境变量 QWEN_API_KEY
# 未配置时 /api/parrot/vision/vlm 返回 5001，其他功能不受影响
qwen:
  vision:
    enabled: true                      # 已配置 Qwen API Key
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${QWEN_API_KEY:}
    model: qwen3.5-flash
