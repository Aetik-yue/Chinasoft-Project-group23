<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鹦鹉实时行为识别</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(165deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 16px; color: #fff; overflow: hidden;
        }
        .header { text-align: center; margin-bottom: 12px; flex-shrink: 0; }
        .header h1 { font-size: 24px; font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #888; font-size: 12px; margin-top: 2px; }
        .main-container { display: flex; gap: 16px; max-width: 1000px; width: 100%; flex: 1; min-height: 0; }
        .video-section { flex: 1; min-width: 380px; display: flex; flex-direction: column; }
        .video-card {
            background: linear-gradient(145deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px; padding: 12px; flex: 1; display: flex; flex-direction: column; min-height: 0;
        }
        .video-wrapper {
            position: relative; border-radius: 12px; overflow: hidden;
            background: linear-gradient(135deg, #1e1e3f, #0f0f1f);
            aspect-ratio: 4/3; flex: 1; min-height: 0;
        }
        .video-wrapper video, .video-wrapper canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }
        #video, #canvas { transform: scaleX(-1); }
        #canvas { pointer-events: none; }
        .camera-badge {
            position: absolute; top: 16px; left: 16px; display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,.6); backdrop-filter: blur(10px); padding: 8px 14px;
            border-radius: 20px; font-size: 12px; z-index: 20;
        }
        .camera-badge .dot { width: 8px; height: 8px; background: #ff4757; border-radius: 50%; animation: pulse 2s infinite; }
        .camera-badge.active .dot { background: #2ed573; }
        @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1);} 50% { opacity: .5; transform: scale(1.2);} }
        .fps-display {
            position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,.6);
            backdrop-filter: blur(10px); padding: 8px 14px; border-radius: 20px; font-size: 12px; z-index: 20; display: none;
        }
        .info-section { width: 260px; flex-shrink: 0; }
        .info-card {
            background: linear-gradient(145deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px; padding: 16px;
        }
        .section-title { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ff4757; box-shadow: 0 0 20px rgba(255,71,87,.4); transition: all .3s; }
        .status-dot.connected { background: #2ed573; box-shadow: 0 0 20px rgba(46,213,115,.6); }
        .status-label { font-size: 14px; color: #aaa; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-card { background: rgba(255,255,255,.03); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid rgba(255,255,255,.05); }
        .stat-value { font-size: 22px; font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 11px; color: #666; }
        .info-line { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
        .info-line span:first-child { color: #888; }
        .info-line span:last-child { color: #ddd; font-weight: 500; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 12px; transition: all .3s; }
        .btn-start { background: linear-gradient(135deg, #2ed573, #26ab5f); color: #fff; }
        .btn-start:hover:not(:disabled) { transform: translateY(-2px); }
        .btn-stop { background: rgba(255,255,255,.08); color: #fff; border: 1px solid rgba(255,255,255,.15); }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .abnormal-banner {
            margin-top: 12px; padding: 10px 12px; border-radius: 10px; font-size: 13px;
            display: none; align-items: center; gap: 8px; font-weight: 600;
        }
        .abnormal-banner.show { display: flex; }
        .abnormal-banner.danger { background: linear-gradient(135deg, rgba(255,71,87,.2), rgba(255,71,87,.05)); border: 1px solid rgba(255,71,87,.5); color: #ff6b6b; }
        .abnormal-banner.warning { background: linear-gradient(135deg, rgba(255,165,2,.2), rgba(255,165,2,.05)); border: 1px solid rgba(255,165,2,.5); color: #ffa502; }
        .error-box { margin-top: 12px; padding: 10px 12px; border-radius: 10px; font-size: 12px;
            background: linear-gradient(135deg, rgba(255,71,87,.15), rgba(255,71,87,.05));
            border: 1px solid rgba(255,71,87,.3); color: #ff6b6b; display: none; }
        .error-box.show { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>鹦鹉实时行为识别</h1>
        <p>YOLO 定位 + CLIP 零样本行为/种类 + 异常预警</p>
    </div>

    <div class="main-container">
        <div class="video-section">
            <div class="video-card">
                <div class="video-wrapper">
                    <video id="video" autoplay muted playsinline></video>
                    <canvas id="canvas"></canvas>
                    <div class="camera-badge" id="cameraBadge"><span class="dot"></span><span>摄像头未启动</span></div>
                    <div class="fps-display" id="fpsDisplay">FPS: <span id="fpsValue">0</span></div>
                </div>
            </div>
        </div>

        <div class="info-section">
            <div class="info-card">
                <div class="section-title">连接状态</div>
                <div class="status-row">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <div class="status-dot" id="statusDot"></div>
                        <span class="status-label" id="statusLabel">等待启动</span>
                    </div>
                </div>

                <div class="section-title">检测统计</div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="count">0</div><div class="stat-label">鹦鹉数</div></div>
                    <div class="stat-card"><div class="stat-value" id="conf">0%</div><div class="stat-label">最高置信度</div></div>
                </div>

                <div class="section-title" style="margin-top:12px;">识别结果</div>
                <div class="info-line"><span>行为</span><span id="behavior">—</span></div>
                <div class="info-line"><span>种类</span><span id="species">—</span></div>

                <div class="abnormal-banner" id="abnormalBanner"></div>
                <div class="error-box" id="errorBox"></div>

                <button class="btn btn-start" id="startBtn">启动检测</button>
                <button class="btn btn-stop" id="stopBtn" disabled>停止</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDot = document.getElementById('statusDot');
        const statusLabel = document.getElementById('statusLabel');
        const cameraBadge = document.getElementById('cameraBadge');
        const countEl = document.getElementById('count');
        const confEl = document.getElementById('conf');
        const behaviorEl = document.getElementById('behavior');
        const speciesEl = document.getElementById('species');
        const abnormalBanner = document.getElementById('abnormalBanner');
        const errorBox = document.getElementById('errorBox');
        const fpsDisplay = document.getElementById('fpsDisplay');
        const fpsValue = document.getElementById('fpsValue');

        let ws = null, stream = null, isRunning = false;
        let captureInterval = null;
        let fpsFrameCount = 0, lastFpsUpdate = 0;

        const PROCESS_WIDTH = 640, PROCESS_HEIGHT = 480;
        const WS_URL = `ws://${window.location.host}/ws/parrot`;
        const CAPTURE_INTERVAL = 300;
        const DEVICE_ID = 'default';

        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);

        function showError(m) { errorBox.textContent = m; errorBox.classList.add('show'); }
        function hideError() { errorBox.classList.remove('show'); }

        async function startCamera() {
            hideError();
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: PROCESS_WIDTH }, height: { ideal: PROCESS_HEIGHT }, facingMode: 'user' }
                });
                video.srcObject = stream;
                await new Promise(r => { video.onloadedmetadata = () => { video.play(); r(); }; });
                canvas.width = video.videoWidth || PROCESS_WIDTH;
                canvas.height = video.videoHeight || PROCESS_HEIGHT;
                startBtn.disabled = true; stopBtn.disabled = false;
                cameraBadge.classList.add('active');
                cameraBadge.querySelector('span:last-child').textContent = '摄像头运行中';
                fpsDisplay.style.display = 'block';
                connectWebSocket();
                startCapture();
            } catch (err) {
                console.error(err); showError('无法访问摄像头: ' + err.message);
            }
        }

        function stopCamera() {
            isRunning = false;
            if (captureInterval) { clearInterval(captureInterval); captureInterval = null; }
            if (ws) { ws.close(); ws = null; }
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            countEl.textContent = '0'; confEl.textContent = '0%';
            behaviorEl.textContent = '—'; speciesEl.textContent = '—';
            abnormalBanner.classList.remove('show');
            statusDot.classList.remove('connected');
            statusLabel.textContent = '已停止';
            cameraBadge.classList.remove('active');
            cameraBadge.querySelector('span:last-child').textContent = '摄像头未启动';
            fpsDisplay.style.display = 'none';
            startBtn.disabled = false; stopBtn.disabled = true;
        }

        function connectWebSocket() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => { isRunning = true; statusDot.classList.add('connected'); statusLabel.textContent = '已连接'; };
            ws.onmessage = (e) => {
                try { handleResult(JSON.parse(e.data)); } catch (err) { console.error('解析失败', err); }
            };
            ws.onclose = () => {
                statusDot.classList.remove('connected'); statusLabel.textContent = '连接关闭';
                if (isRunning) setTimeout(() => { if (isRunning) connectWebSocket(); }, 1500);
            };
            ws.onerror = () => showError('服务器连接失败');
        }

        function startCapture() {
            captureInterval = setInterval(() => {
                if (video.readyState === video.HAVE_ENOUGH_DATA && ws && ws.readyState === WebSocket.OPEN) captureFrame();
            }, CAPTURE_INTERVAL);
        }

        function captureFrame() {
            const temp = document.createElement('canvas');
            temp.width = video.videoWidth || PROCESS_WIDTH;
            temp.height = video.videoHeight || PROCESS_HEIGHT;
            const tctx = temp.getContext('2d');
            tctx.save(); tctx.scale(-1, 1); tctx.drawImage(video, -temp.width, 0); tctx.restore();
            const imageData = temp.toDataURL('image/jpeg', 0.5);
            ws.send(JSON.stringify({ image: imageData, deviceId: DEVICE_ID }));
            fpsFrameCount++;
            const now = performance.now();
            if (now - lastFpsUpdate >= 1000) { fpsValue.textContent = fpsFrameCount; fpsFrameCount = 0; lastFpsUpdate = now; }
        }

        function handleResult(result) {
            if (result.error) { showError(result.error); return; }
            hideError();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const boxes = result.boxes || [];
            countEl.textContent = boxes.length;
            let maxConf = 0;
            boxes.forEach(b => { drawBox(b); maxConf = Math.max(maxConf, b.confidence || 0); });
            confEl.textContent = Math.round(maxConf * 100) + '%';
            behaviorEl.textContent = result.behavior || '—';
            speciesEl.textContent = result.species || '—';
            if (result.abnormal && result.abnormal.length) showAbnormal(result.abnormal);
            else abnormalBanner.classList.remove('show');
        }

        function drawBox(b) {
            const canvasW = canvas.width;
            const boxColor = (b.confidence || 0) >= 0.8 ? '#2ed573' : (b.confidence || 0) >= 0.5 ? '#ffa502' : '#ff4757';
            const drawX = canvasW - b.x - b.width;
            ctx.save();
            ctx.strokeStyle = boxColor; ctx.lineWidth = 3;
            ctx.strokeRect(drawX, b.y, b.width, b.height);
            ctx.fillStyle = boxColor; ctx.font = 'bold 13px sans-serif';
            const label = (b.label || 'parrot') + ' ' + Math.round((b.confidence || 0) * 100) + '%';
            ctx.fillText(label, drawX, b.y - 6);
            ctx.restore();
        }

        function showAbnormal(list) {
            const ev = list[0];
            abnormalBanner.className = 'abnormal-banner show ' + (ev.severity === 'DANGER' ? 'danger' : 'warning');
            abnormalBanner.textContent = '⚠ ' + ev.message;
        }
    </script>
</body>
</html>
