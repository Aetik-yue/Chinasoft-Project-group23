mqtt:
  host-url: ${MQTT_HOST_URL:tcp://localhost:1883}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}
  client-id: ${MQTT_CLIENT_ID:smoke-data-writer}
  topic: ${MQTT_DATA_TOPIC:group23}
  qos: ${MQTT_QOS:1}
  clean-session: true
  automatic-reconnect: true
  connection-timeout: 10
  keep-alive: 30

database:
  url: ${MYSQL_URL:jdbc:mysql://localhost:3306/dream28?useUnicode=true&characterEncoding=utf8&useSSL=false}
  username: ${MYSQL_USERNAME:root}
  password: ${MYSQL_PASSWORD:}

logging:
  level:
    com.chinasoft.getdata: INFO
