spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/dream28?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.jdbc.Driver

mqtt:
  host-url: ${MQTT_HOST_URL:tcp://localhost:1883}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}
  client-id: ${MQTT_CLIENT_ID:smoke-control-publisher}
  topic: ${MQTT_CONTROL_TOPIC:group23-s-to-h}
  qos: ${MQTT_QOS:1}
  retained: false
  clean-session: true
  automatic-reconnect: true
  connection-timeout: 10
  keep-alive: 30

control:
  device-id: SMK-001
  poll-interval-ms: ${CONTROL_POLL_INTERVAL_MS:1000}

logging:
  level:
    com.chinasoft.postdata: INFO
